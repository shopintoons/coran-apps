<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Hisn al-Muslim & Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: radial-gradient(circle at center, #1a2f38 0%, #050a0c 100%);
            font-family: 'Inter', sans-serif; color: white; 
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat; opacity: 0.2; z-index: -1; }

        .controls-panel {
            position: absolute; top: 0; width: 100%; text-align: center; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 15px 0; backdrop-filter: blur(10px);
            border-bottom: 1px solid #c9ad60;
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }

        select, input, button { 
            background: rgba(255, 255, 255, 0.05); color: #c9ad60; border: 1px solid #c9ad60; 
            padding: 8px 15px; border-radius: 20px; outline: none; cursor: pointer;
        }

        .active-tab { background: #c9ad60 !important; color: black !important; font-weight: bold; }

        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; }

        #arabic { 
            font-family: 'Amiri', serif; font-size: clamp(1.4rem, 3.5vw, 2.8rem); color: #c9ad60; 
            margin-bottom: 20px; text-shadow: 0 0 20px rgba(201, 173, 96, 0.3);
            max-height: 45vh; overflow-y: auto; width: 100%;
        }
        
        #french { font-size: clamp(0.9rem, 2vw, 1.3rem); font-weight: 300; max-width: 800px; opacity: 0.85; line-height: 1.6; }

        #status-info { color: #c9ad60; font-size: 0.9rem; margin-top: 15px; letter-spacing: 1px; }

        .player-bar { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        audio { width: 320px; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="controls-panel">
        <div class="row">
            <button id="btnQuran" class="active-tab" onclick="switchTab('quran')">LE NOBLE CORAN</button>
            <button id="btnDua" onclick="switchTab('dua')">CITADELLE DU MUSULMAN</button>
        </div>

        <div id="quran-controls" class="row">
            <select id="surahSelect" onchange="loadSurahMetadata(this.value)"><option>Chargement...</option></select>
            <input type="number" id="startAyah" value="1" style="width: 50px;">
            <input type="number" id="endAyah" value="3" style="width: 50px;">
            <select id="repeatCount">
                <option value="1">1x</option><option value="3">3x</option><option value="999">∞</option>
            </select>
            <button onclick="startBlockPlayback()" style="background:#c9ad60; color:black;">LANCER</button>
        </div>

        <div id="dua-controls" class="row" style="display:none;">
            <select id="duaSelect" onchange="playDua(this.value)" style="width: 300px;">
                <option value="">-- Sélectionner une invocation --</option>
                <optgroup label="Matin & Soir">
                    <option value="matin_1">Invocation du matin (Audio)</option>
                    <option value="soir_1">Invocation du soir (Audio)</option>
                </optgroup>
                <optgroup label="Vie Quotidienne">
                    <option value="manger">Avant de manger</option>
                    <option value="habiller">En s'habillant</option>
                    <option value="sortir_maison">En sortant de la maison</option>
                </optgroup>
            </select>
        </div>
    </div>

    <div class="container">
        <div id="arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div id="french">Bienvenue sur votre application.<br><small>Enseignements du Prophète Muhammad ﷺ</small></div>
        <div id="status-info"></div>
    </div>

    <div class="player-bar">
        <audio id="mainAudio" controls></audio>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const arDiv = document.getElementById('arabic');
        const frDiv = document.getElementById('french');
        const status = document.getElementById('status-info');

        // Base de données étendue des Invocations
        const adhkar = {
            matin_1: {
                ar: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ",
                fr: "Nous sommes au matin et la royauté appartient à Allah. Louange à Allah, nul n'est digne d'être adoré en dehors d'Allah seul sans associé.",
                mp3: "https://download.quranicaudio.com/adhkar/morning/01.mp3"
            },
            soir_1: {
                ar: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ",
                fr: "Nous sommes au soir et la royauté appartient à Allah. Louange à Allah...",
                mp3: "https://download.quranicaudio.com/adhkar/evening/01.mp3"
            },
            manger: {
                ar: "بِسْمِ اللَّهِ",
                fr: "Au nom d'Allah.",
                mp3: "https://www.hisnmuslim.com/audio/ar/1.mp3" 
            },
            habiller: {
                ar: "الْحَمْدُ لِلَّهِ الَّذِي كَسَانِي هَذَا الثَّوْبَ وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلَا قُوَّةٍ",
                fr: "Louange à Allah qui m'a vêtu de ce vêtement et me l'a accordé sans aucune force ni puissance de ma part.",
                mp3: "https://www.hisnmuslim.com/audio/ar/7.mp3"
            },
            sortir_maison: {
                ar: "بِسْمِ اللَّهِ ، تَوَكَّلْتُ عَلَى اللَّهِ ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",
                fr: "Au nom d'Allah, je m'en remets à Allah, il n'y a de force et de puissance que par Allah.",
                mp3: "https://www.hisnmuslim.com/audio/ar/16.mp3"
            }
        };

        function switchTab(type) {
            document.getElementById('quran-controls').style.display = type === 'quran' ? 'flex' : 'none';
            document.getElementById('dua-controls').style.display = type === 'dua' ? 'flex' : 'none';
            document.getElementById('btnQuran').classList.toggle('active-tab', type === 'quran');
            document.getElementById('btnDua').classList.toggle('active-tab', type === 'dua');
        }

        function playDua(id) {
            if(!id || !adhkar[id]) return;
            const item = adhkar[id];
            arDiv.innerText = item.ar;
            frDiv.innerText = item.fr;
            status.innerText = "Lecture de l'invocation...";
            audio.src = item.mp3;
            audio.play();
        }

        // --- Logique Coran ---
        async function fetchSurahs() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const s = document.getElementById('surahSelect');
            s.innerHTML = '<option value="">-- Sélectionner Sourate --</option>';
            data.data.forEach(x => {
                let o = document.createElement('option');
                o.value = x.number; o.text = x.number + ". " + x.englishName;
                o.dataset.count = x.numberOfAyahs; s.appendChild(o);
            });
        }

        function loadSurahMetadata(n) {
            if(!n) return;
            const opt = document.getElementById('surahSelect').selectedOptions[0];
            document.getElementById('endAyah').value = Math.min(3, opt.dataset.count);
        }

        async function startBlockPlayback() {
            const n = document.getElementById('surahSelect').value;
            const start = parseInt(document.getElementById('startAyah').value)-1;
            const end = parseInt(document.getElementById('endAyah').value)-1;
            const reps = parseInt(document.getElementById('repeatCount').value);
            
            status.innerText = "Chargement des audios...";
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,fr.hamidullah,ar.alafasy`);
            const d = await res.json();
            let curRep = 1, curIdx = start;

            function play() {
                if(curIdx > end) {
                    if(curRep < reps) { curRep++; curIdx = start; play(); }
                    else { status.innerText = "Terminé."; }
                    return;
                }
                arDiv.innerText = d.data[0].ayahs[curIdx].text;
                frDiv.innerText = d.data[1].ayahs[curIdx].text;
                status.innerText = `Bloc : Tour ${curRep}/${reps} | Verset ${curIdx+1}`;
                audio.src = d.data[2].ayahs[curIdx].audio; audio.play();
                audio.onended = () => { curIdx++; play(); };
            }
            play();
        }

        fetchSurahs();
    </script>
</body>
</html>
