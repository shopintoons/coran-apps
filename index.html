<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Mémorisation par Bloc - Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: radial-gradient(circle at center, #1a2f38 0%, #050a0c 100%);
            font-family: 'Inter', sans-serif; color: white; 
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.2; z-index: -1;
        }

        .controls-panel {
            position: absolute; top: 0; width: 100%; text-align: center; z-index: 10;
            display: flex; flex-direction: column; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.6); padding: 15px 0; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201, 173, 96, 0.3);
        }

        .row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 5px; }

        select, input { 
            background: rgba(255, 255, 255, 0.1); color: #c9ad60; border: 1px solid #c9ad60; 
            padding: 8px 12px; border-radius: 20px; outline: none; font-family: 'Inter';
        }

        label { font-size: 0.85rem; color: #ddd; align-self: center; }

        .container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; padding: 0 10%; 
        }

        #arabic { 
            font-family: 'Amiri', serif; font-size: clamp(1.8rem, 5vw, 3.8rem); color: #c9ad60; 
            margin-bottom: 25px; text-shadow: 0 0 30px rgba(201, 173, 96, 0.4);
            transition: opacity 0.4s; line-height: 1.6;
        }
        
        #french { 
            font-size: clamp(1.1rem, 2.5vw, 1.6rem); font-weight: 300; max-width: 850px;
            line-height: 1.5; opacity: 0.9; transition: opacity 0.4s;
        }

        #status-info { color: #c9ad60; font-size: 1rem; margin-top: 20px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 15px; }

        .player-bar { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        audio { width: 320px; border-radius: 50px; }

        .btn-start { background:#c9ad60; color:black; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .btn-start:hover { background:#e2c67d; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="controls-panel">
        <div class="row">
            <select id="surahSelect" onchange="loadSurahMetadata(this.value)">
                <option value="">-- Chargement des Sourates... --</option>
            </select>
        </div>
        <div class="row" id="options-row" style="display:none;">
            <label>Du verset:</label>
            <input type="number" id="startAyah" value="1" min="1" style="width: 55px;">
            <label>au verset:</label>
            <input type="number" id="endAyah" value="3" min="1" style="width: 55px;">
            <label>Répéter le bloc:</label>
            <select id="repeatCount">
                <option value="1">1 fois</option>
                <option value="2">2 fois</option>
                <option value="3">3 fois</option>
                <option value="5">5 fois</option>
                <option value="10">10 fois</option>
                <option value="999">À l'infini</option>
            </select>
            <button class="btn-start" onclick="startBlockPlayback()">LANCER LE BLOC</button>
        </div>
    </div>

    <div class="container">
        <div id="arabic">بِسْمِ اللَّهِ</div>
        <div id="french">Sélectionnez une sourate pour commencer votre mémorisation.<br>
        <small style="opacity:0.7">Message transmis au Prophète Muhammad ﷺ</small></div>
        <div id="status-info" style="display:none;"></div>
    </div>

    <div class="player-bar">
        <audio id="quranAudio" controls></audio>
    </div>

    <script>
        const select = document.getElementById('surahSelect');
        const arDiv = document.getElementById('arabic');
        const frDiv = document.getElementById('french');
        const statusDiv = document.getElementById('status-info');
        const audioPlayer = document.getElementById('quranAudio');
        
        async function fetchSurahs() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                select.innerHTML = '<option value="">-- Sélectionnez une Sourate --</option>';
                data.data.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.text = `${surah.number}. ${surah.englishName}`;
                    option.dataset.count = surah.numberOfAyahs;
                    select.appendChild(option);
                });
            } catch (e) { console.error("Erreur de chargement"); }
        }

        function loadSurahMetadata(number) {
            if(!number) return;
            const option = select.options[select.selectedIndex];
            document.getElementById('startAyah').value = 1;
            document.getElementById('endAyah').value = Math.min(3, option.dataset.count);
            document.getElementById('options-row').style.display = 'flex';
        }

        async function startBlockPlayback() {
            const number = select.value;
            const startIdx = parseInt(document.getElementById('startAyah').value) - 1;
            const endIdx = parseInt(document.getElementById('endAyah').value) - 1;
            const maxRepeats = parseInt(document.getElementById('repeatCount').value);

            arDiv.innerText = "Préparation...";
            statusDiv.style.display = "block";
            
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${number}/editions/quran-uthmani,fr.hamidullah,ar.alafasy`);
                const data = await response.json();
                
                const arabes = data.data[0].ayahs;
                const francais = data.data[1].ayahs;
                const audios = data.data[2].ayahs;

                let currentBlockRepeat = 1;
                let currentAyahIndex = startIdx;

                function playAyah() {
                    if (currentAyahIndex > endIdx || currentAyahIndex >= arabes.length) {
                        if (currentBlockRepeat < maxRepeats) {
                            currentBlockRepeat++;
                            currentAyahIndex = startIdx;
                            playAyah();
                        } else {
                            statusDiv.innerText = "Séance terminée.";
                        }
                        return;
                    }

                    arDiv.innerText = arabes[currentAyahIndex].text;
                    frDiv.innerText = francais[currentAyahIndex].text;
                    statusDiv.innerText = `Bloc : Tour ${currentBlockRepeat} / ${maxRepeats === 999 ? '∞' : maxRepeats} | Verset : ${currentAyahIndex + 1}`;

                    audioPlayer.src = audios[currentAyahIndex].audio;
                    audioPlayer.play();

                    audioPlayer.onended = () => {
                        currentAyahIndex++;
                        playAyah();
                    };
                }
                playAyah();
            } catch (e) {
                frDiv.innerText = "Erreur de chargement.";
            }
        }
        fetchSurahs();
    </script>
</body>
</html>
