<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Coran & Invocations - Mémorisation</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: radial-gradient(circle at center, #1a2f38 0%, #050a0c 100%);
            font-family: 'Inter', sans-serif; color: white; 
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.2; z-index: -1;
        }

        .controls-panel {
            position: absolute; top: 0; width: 100%; text-align: center; z-index: 10;
            display: flex; flex-direction: column; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.7); padding: 15px 0; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201, 173, 96, 0.3);
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 5px; }

        select, input, button { 
            background: rgba(255, 255, 255, 0.1); color: #c9ad60; border: 1px solid #c9ad60; 
            padding: 8px 12px; border-radius: 20px; outline: none; font-family: 'Inter'; cursor: pointer;
        }

        .active-tab { background: #c9ad60; color: black; font-weight: bold; }

        .container { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; padding: 0 10%; 
        }

        #arabic { 
            font-family: 'Amiri', serif; font-size: clamp(1.5rem, 4vw, 3rem); color: #c9ad60; 
            margin-bottom: 25px; text-shadow: 0 0 30px rgba(201, 173, 96, 0.4);
            line-height: 1.8; max-height: 50vh; overflow-y: auto; padding: 10px;
        }
        
        #french { font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 300; max-width: 850px; opacity: 0.9; }

        #status-info { color: #c9ad60; font-size: 0.9rem; margin-top: 15px; font-weight: bold; }

        .player-bar { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        audio { width: 300px; border-radius: 50px; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="controls-panel">
        <div class="row">
            <button id="btnQuran" class="active-tab" onclick="switchTab('quran')">CORAN</button>
            <button id="btnDua" onclick="switchTab('dua')">INVOCATIONS</button>
        </div>

        <div id="quran-controls" class="row">
            <select id="surahSelect" onchange="loadSurahMetadata(this.value)"><option>Chargement...</option></select>
            <input type="number" id="startAyah" value="1" style="width: 50px;">
            <input type="number" id="endAyah" value="3" style="width: 50px;">
            <select id="repeatCount">
                <option value="1">1 fois</option>
                <option value="3">3 fois</option>
                <option value="999">Infini</option>
            </select>
            <button onclick="startBlockPlayback()" style="background:#c9ad60; color:black;">LANCER</button>
        </div>

        <div id="dua-controls" class="row" style="display:none;">
            <select id="duaSelect" onchange="displayDua(this.value)">
                <option value="">-- Choisir une invocation --</option>
                <option value="matin">Protection du Matin</option>
                <option value="soir">Protection du Soir</option>
                <option value="sommeil">Avant de dormir</option>
                <option value="difficulte">En cas de difficulté</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div id="arabic">بِسْمِ اللَّهِ</div>
        <div id="french">Bienvenue sur votre espace spirituel.<br>
        <small>Enseignements du Prophète Muhammad ﷺ</small></div>
        <div id="status-info"></div>
    </div>

    <div class="player-bar">
        <audio id="quranAudio" controls></audio>
    </div>

    <script>
        const invocations = {
            matin: {
                ar: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ",
                fr: "Nous sommes au matin et la royauté appartient à Allah. Louange à Allah, nul n'est digne d'être adoré en dehors d'Allah seul sans associé."
            },
            soir: {
                ar: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ",
                fr: "Nous sommes au soir et la royauté appartient à Allah. Louange à Allah..."
            },
            sommeil: {
                ar: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ",
                fr: "C'est en Ton nom, Seigneur, que je me couche et c'est par Toi que je me relève."
            },
            difficulte: {
                ar: "اللَّهُمَّ لَا سَهْلَ إِلَّا مَا جَعَلْتَهُ سَهْلًا، وَأَنْتَ تَجْعَلُ الْحَزَنَ إِذَا شِئْتَ سَهْلًا",
                fr: "Ô Allah, rien n'est facile sauf ce que Tu rends facile, et Tu rends la difficulté facile si Tu le veux."
            }
        };

        function switchTab(type) {
            document.getElementById('quran-controls').style.display = type === 'quran' ? 'flex' : 'none';
            document.getElementById('dua-controls').style.display = type === 'dua' ? 'flex' : 'none';
            document.getElementById('btnQuran').className = type === 'quran' ? 'active-tab' : '';
            document.getElementById('btnDua').className = type === 'dua' ? 'active-tab' : '';
        }

        function displayDua(id) {
            if(!id) return;
            document.getElementById('arabic').innerText = invocations[id].ar;
            document.getElementById('french').innerText = invocations[id].fr;
            document.getElementById('status-info').innerText = "Invocation quotidienne";
            document.getElementById('quranAudio').src = ""; // Stop audio Coran
        }

        // --- Fonctions Coran (identiques à avant) ---
        async function fetchSurahs() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const select = document.getElementById('surahSelect');
            select.innerHTML = '<option value="">-- Sélectionner Sourate --</option>';
            data.data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.number; opt.text = s.number + ". " + s.englishName;
                opt.dataset.count = s.numberOfAyahs; select.appendChild(opt);
            });
        }

        function loadSurahMetadata(n) {
            if(!n) return;
            const opt = document.getElementById('surahSelect').selectedOptions[0];
            document.getElementById('endAyah').value = Math.min(3, opt.dataset.count);
        }

        async function startBlockPlayback() {
            const n = document.getElementById('surahSelect').value;
            const start = parseInt(document.getElementById('startAyah').value)-1;
            const end = parseInt(document.getElementById('endAyah').value)-1;
            const reps = parseInt(document.getElementById('repeatCount').value);
            
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,fr.hamidullah,ar.alafasy`);
            const d = await res.json();
            let curRep = 1, curIdx = start;

            function play() {
                if(curIdx > end) {
                    if(curRep < reps) { curRep++; curIdx = start; play(); }
                    return;
                }
                document.getElementById('arabic').innerText = d.data[0].ayahs[curIdx].text;
                document.getElementById('french').innerText = d.data[1].ayahs[curIdx].text;
                document.getElementById('status-info').innerText = `Tour ${curRep}/${reps} | Verset ${curIdx+1}`;
                const a = document.getElementById('quranAudio');
                a.src = d.data[2].ayahs[curIdx].audio; a.play();
                a.onended = () => { curIdx++; play(); };
            }
            play();
        }

        fetchSurahs();
    </script>
</body>
</html>
